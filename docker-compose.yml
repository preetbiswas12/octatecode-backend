version: '3.8'

services:
  octate-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
      - "${WS_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      WS_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:*,https://octate.qzz.io}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - octate-network

  # Optional: PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-octate_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-octate_password}
      POSTGRES_DB: ${DB_NAME:-octate_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - octate-network
    ports:
      - "5432:5432"

  # Optional: Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - octate-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  octate-network:
    driver: bridge
